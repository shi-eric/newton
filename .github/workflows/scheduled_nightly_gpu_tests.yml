name: Scheduled Nightly GPU Tests

on:
  push:
    branches:
      - ershi/test-nightly-gpu

jobs:
  gpu-tests:
    if: github.repository == 'shi-eric/newton'
    uses: ./.github/workflows/aws_gpu_tests.yml
    with:
      instance-type: g5.12xlarge  # 4x NVIDIA A10 GPUs, 48 vCPUs
      volume-size: '92'
    permissions:
      id-token: write
      contents: read
    secrets: inherit
